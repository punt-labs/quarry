name: Lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      # fetch-depth: 0 is load-bearing for the ratchets: the OO, coupling, and
      # suppression checks all resolve a merge-base and read the base-commit
      # baseline blob; a shallow clone has neither the base commit nor HEAD~1.
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          enable-cache: true
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.13"
      - run: uv sync --frozen --extra dev
      - run: uv run ruff check .
      - run: uv run ruff format --check .
      - run: uv run mypy src/ tests/
      # pyright is part of local `make type`/`make check` (PL-TC-3) but was
      # absent from CI — that gap let a dependency bump merge green while
      # breaking `make check` locally (reportDeprecated). Run both checkers in
      # CI so a type regression cannot slip through on either one. Force the
      # node-pyright binary to the uv.lock-pinned wrapper version — the same pin
      # `make type` uses — so local and CI always run the identical checker.
      - run: PYRIGHT_PYTHON_FORCE_VERSION=$(uv run python -c "import importlib.metadata as m; print(m.version('pyright'))") uv run pyright src/ tests/
      # Completeness guard: every scored file must be recorded in the committed
      # baseline. Runs on the committed, post-update-oo state where code and
      # baseline are in sync — see the audit-oo comment in the Makefile.
      - name: OO baseline completeness
        run: make audit-oo
      # PR event: score code-at-HEAD against the baseline committed at the
      # merge-base (the whole PR range). --require-base AND the explicit fetch are
      # both mandatory — with either missing, an unfetched/unresolvable base would
      # fail open and let a regression pass.
      - name: Ratchets (PR — merge-base compare)
        if: github.event_name == 'pull_request'
        run: |
          git fetch --no-tags origin "${{ github.base_ref }}"
          BASE="$(git merge-base "origin/${{ github.base_ref }}" HEAD)"
          if [ -z "${BASE}" ]; then
            echo "FATAL: cannot resolve merge-base with origin/${{ github.base_ref }}" >&2
            exit 1
          fi
          make check-oo OO_BASE="--base-ref ${BASE} --require-base"
          make check-coupling COUPLING_BASE="--base-ref ${BASE} --require-base"
          make check-suppressions SUPPRESSION_BASE="--base-ref ${BASE} --require-base"
      # push:[main] after a merge: HEAD~1 is the squash's merge-base, so the
      # ratchets re-run on merged reality — the tripwire that catches a red main
      # from a bad squash or a direct push.
      - name: Ratchets (main — post-merge tripwire)
        if: github.event_name == 'push'
        run: |
          make check-oo OO_BASE="--base-ref HEAD~1 --require-base"
          make check-coupling COUPLING_BASE="--base-ref HEAD~1 --require-base --tripwire"
          make check-suppressions SUPPRESSION_BASE="--base-ref HEAD~1 --require-base"
